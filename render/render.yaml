services:
  - type: web
    name: repochat
    runtime: node
    plan: free
    buildCommand: |
      npm install
      pip3 install google-colab-cli
    startCommand: npm start
    envVars:
      - key: API_SECRET
        sync: false
      - key: COLAB_AUTH_TOKEN
        sync: false
      - key: MAX_SESSIONS
        value: "2"
      - key: NODE_ENV
        value: production
